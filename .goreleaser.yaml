project_name: upkeep

before:
  hooks:
    - go mod tidy
    - go test ./... -timeout 120s

builds:
  - binary: upkeep
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\(.+\))?!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\(.+\))?!?:.+$'
      order: 1
    - title: "📦 Other Changes"
      order: 999
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: teknikqa
    name: upkeep
  draft: false
  prerelease: auto
