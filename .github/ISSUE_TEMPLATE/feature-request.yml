---
name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: "What are you trying to do, and why doesn't the current behaviour work?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "How would you like this to work?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Any workarounds or alternative approaches you've thought of."
    validations:
      required: false
