version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - misspell
    - unconvert
    - nolintlint

  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*os.File).Close
        - (net/http.ResponseBody).Close
        - os.Remove
        - os.MkdirAll
        - (*github.com/teknikqa/upkeep/internal/logging.Logger).Close
    staticcheck:
      checks:
        - "all"
        - "-QF1008"
        - "-QF1012"
        - "-ST1000"
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: unused-parameter
          disabled: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unused
          - errcheck
      - linters:
          - errcheck
        text: '(?i)\.Close'

run:
  go: "1.24"
  timeout: 5m
