version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - misspell
    - unconvert
    - nolintlint
    - gosec

  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*os.File).Close
        - (net/http.ResponseBody).Close
        - os.Remove
        - os.MkdirAll
        - (*github.com/teknikqa/upkeep/internal/logging.Logger).Close
    gosec:
      excludes:
        - G104  # Unhandled errors on Close/Remove — already covered by errcheck exclusions
        - G204  # Subprocess launched with variable — intentional; this tool runs CLI commands
        - G301  # Directory permissions > 0750 — 0755 is standard for dirs
        - G302  # File permissions > 0600 — log files use 0640 intentionally
        - G304  # File inclusion via variable — paths come from user config, not external input
        - G306  # WriteFile permissions > 0600 — deferred scripts need 0700
        - G115  # Integer overflow uintptr→int — standard Go pattern for Fd() calls
    staticcheck:
      checks:
        - "all"
        - "-QF1008"
        - "-QF1012"
        - "-ST1000"
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: unused-parameter
          disabled: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unused
          - errcheck
          - gosec
      - linters:
          - errcheck
        text: '(?i)\.Close'

run:
  go: "1.24"
  timeout: 5m
